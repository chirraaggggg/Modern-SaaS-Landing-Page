<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a3e635;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#84cc16;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.15"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="#171717"/>
  
  <!-- Blurred glow effects -->
  <ellipse cx="100" cy="80" rx="120" ry="100" fill="url(#grad1)" filter="url(#blur1)" opacity="0.5"/>
  <ellipse cx="300" cy="220" rx="140" ry="100" fill="url(#grad2)" filter="url(#blur1)" opacity="0.4"/>
  
  <!-- Main card with blur -->
  <rect x="24" y="24" width="352" height="252" rx="16" fill="#262626" stroke="#a3e635" stroke-width="1" stroke-opacity="0.4"/>
  
  <!-- Content with blur overlay -->
  <rect x="40" y="48" width="140" height="100" rx="12" fill="#404040" opacity="0.6"/>
  <rect x="40" y="48" width="140" height="100" rx="12" fill="url(#grad1)" opacity="0.25" filter="url(#blur1)"/>
  
  <!-- UI elements -->
  <rect x="200" y="48" width="160" height="12" rx="6" fill="#a3e635"/>
  <rect x="200" y="76" width="120" height="8" rx="4" fill="#525252"/>
  <rect x="200" y="92" width="100" height="8" rx="4" fill="#525252"/>
  <rect x="200" y="108" width="80" height="8" rx="4" fill="#525252"/>
  
  <!-- Lime accent button with blur -->
  <rect x="200" y="132" width="120" height="40" rx="8" fill="#a3e635" fill-opacity="0.7"/>
  <rect x="200" y="132" width="120" height="40" rx="8" fill="url(#grad1)" opacity="0.4" filter="url(#blur1)"/>
  
  <!-- Bottom cards -->
  <rect x="40" y="164" width="160" height="96" rx="12" fill="#404040" opacity="0.5"/>
  <rect x="40" y="164" width="160" height="96" rx="12" fill="url(#grad2)" opacity="0.2" filter="url(#blur1)"/>
  
  <rect x="216" y="164" width="144" height="96" rx="12" fill="#404040" opacity="0.4"/>
  <rect x="216" y="164" width="144" height="96" rx="12" fill="url(#grad1)" opacity="0.15" filter="url(#blur1)"/>
  
  <!-- Floating blur elements -->
  <circle cx="60" cy="230" r="24" fill="#a3e635" fill-opacity="0.15" filter="url(#blur1)"/>
  <circle cx="340" cy="70" r="20" fill="#8b5cf6" fill-opacity="0.2" filter="url(#blur1)"/>
  
  <!-- Window controls -->
  <circle cx="356" cy="40" r="5" fill="#ef4444"/>
  <circle cx="340" cy="40" r="5" fill="#f59e0b"/>
  <circle cx="324" cy="40" r="5" fill="#22c55e"/>
  
  <!-- Decorative dots -->
  <circle cx="60" cy="200" r="4" fill="#a3e635" fill-opacity="0.7"/>
  <circle cx="80" cy="200" r="4" fill="#525252"/>
  <circle cx="100" cy="200" r="4" fill="#525252"/>
</svg>
