<svg width="146" height="48" viewBox="0 0 146 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a3e635;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a3e635;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#84cc16;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Zuna icon/symbol -->
  <g transform="translate(2, 10)">
    <!-- Outer ring -->
    <circle cx="12" cy="14" r="12" fill="none" stroke="url(#iconGradient)" stroke-width="2" opacity="0.8"/>
  </g>
  
  <!-- Zuna text -->
  <text x="36" y="32" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="26" font-weight="600" fill="url(#textGradient)" letter-spacing="-0.3">Zuna</text>
</svg>
